        <a href="https://www.instagram.com/pipraine/" target="_blank" rel="noopener" aria-label="Instagram" class="nav-insta"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></a>

      <ul>
        <li><a href="index.html">Home</a></li>

        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- ========== SPLIT CONTACT ========== -->
  <section class="ct-split">
    <!-- Left — personal, visual -->
    <div class="ct-left">
      <div class="ct-left-inner reveal reveal-left">
        <img src="assets/pip_selfie.png" alt="Pip Raine" class="ct-photo">
        <h1>I'd love to<br>hear from you.</h1>
        <div class="ct-details">
          <a href="mailto:hello@pipraine.com" class="ct-detail-link">hello@pipraine.com</a>
          <a href="https://www.instagram.com/pipraine/" target="_blank" rel="noopener" class="ct-detail-link">@pipraine</a>
          <span class="ct-detail-loc">Based in the UK</span>
        </div>
        <img src="assets/pip_anchor.png" alt="" class="ct-anchor" aria-hidden="true">
      </div>
    </div>

    <!-- Right — form -->
    <div class="ct-right">
      <form class="ct-form reveal reveal-right" action="#" method="post" novalidate>
        <h2>Send a message</h2>

        <div class="form-group">
          <label for="ct-name">Name</label>
          <input type="text" id="ct-name" name="name" required placeholder="Your name" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="ct-email">Email</label>
          <input type="email" id="ct-email" name="email" required placeholder="your@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="ct-interest">I'm interested in...</label>
          <select id="ct-interest" name="interest" required>
            <option value="" disabled selected>Select an option</option>
            <option value="1:1 Sessions">1:1 Sessions</option>
            <option value="Group Breathwork">Group Breathwork</option>
            <option value="Queer & Creative Sessions">Queer & Creative Sessions</option>
            <option value="Collaboration">Collaboration</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ct-message">Message</label>
          <textarea id="ct-message" name="message" rows="5" required placeholder="Tell me what you're looking for..."></textarea>
        </div>

        <button type="submit" class="btn btn--jade btn--lg">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <a href="index.html" class="wordmark">Pip Raine</a>

      <p class="footer-copy">&copy; 2026 Pip Raine. All rights reserved.</p>
    </div>
  </footer>
